name: Secretary
options:
  bundleIdPrefix: com.secretary
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  SecretaryKit:
    path: ../SecretaryKit
  SecretaryDeviceUnlock:
    path: ../SecretaryDeviceUnlock
  SecretaryVaultAccess:
    path: ../SecretaryVaultAccess
targets:
  Secretary:
    type: application
    platform: iOS
    sources:
      - path: Sources
      # Bundled under "Fixtures", NOT "Resources": a folder literally named
      # "Resources" in a (flat) iOS .app makes codesign's seal logic fail with
      # the misleading "code object is not signed at all / embedded.mobileprovision"
      # on device. Any other name signs cleanly. Loaded via subdirectory: "Fixtures".
      - path: Fixtures
        type: folder
        optional: true
    dependencies:
      - package: SecretaryKit
        product: SecretaryKit
      - package: SecretaryDeviceUnlock
        product: SecretaryDeviceUnlock
      - package: SecretaryDeviceUnlock
        product: SecretaryDeviceUnlockUI
      - package: SecretaryVaultAccess
        product: SecretaryVaultAccess
      - package: SecretaryVaultAccess
        product: SecretaryVaultAccessUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.secretary.app
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Unlock your Secretary vault with Face ID."
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
        SWIFT_VERSION: "5.9"
        # Disable the Xcode 16 "debug dylib" split: it leaves Secretary.debug.dylib
        # unsigned by the linker (-no_adhoc_codesign) and breaks on-device codesign
        # ("code object is not signed at all"). Off → single signed executable.
        ENABLE_DEBUG_DYLIB: "NO"
