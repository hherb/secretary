# cargo-audit configuration — see .github/workflows/audit.yml (#354).
#
# The audit job runs `cargo audit --deny warnings`, so ANY advisory (RustSec
# vulnerability, unmaintained, or unsound) fails CI. The entries below are the
# advisories we have consciously ACCEPTED; each must have a rationale and,
# ideally, a tracking issue. Adding an id here is a deliberate risk decision —
# not a way to silence noise. Re-review this list whenever Tauri's GTK stack or
# the uniffi/anyhow chain is upgraded, since most of these clear on that bump.
#
# Most of these are "unmaintained"/"unsound" warnings on desktop-shell or
# bindgen-tooling transitives that never touch the cryptographic core. The
# quick-xml pair (RUSTSEC-2026-0194/0195) is the exception: those ARE
# vulnerability-class advisories, accepted only because they are not reachable
# with attacker-controlled input in this app (see the rationale on those two
# entries below). Everything here is desktop-only and outside the crypto core,
# FFI bridge, and mobile clients.
[advisories]
ignore = [
  # --- quick-xml DoS via malicious XML, transitive via Tauri (desktop only) ---
  # HIGH (7.5), fixed in quick-xml >=0.41.0, but NOT reachable here. quick-xml
  # 0.39.4 enters the tree via TWO Tauri-only paths, neither attacker-facing
  # (no secretary crate uses quick-xml; vault data is CBOR/TOML, never XML):
  #   1. plist -> tauri (macOS): `plist` parses only the app's own trusted,
  #      signed Info.plist bundle metadata. `cargo tree -i quick-xml` shows this.
  #   2. wayland-scanner -> wl-clipboard-rs -> arboard ->
  #      tauri-plugin-clipboard-manager (Linux): a BUILD-TIME proc-macro that
  #      parses static Wayland protocol XML during compilation. Trusted,
  #      compile-time input; only visible in `cargo tree -i quick-xml --target
  #      all` or on a Linux host. This second path is why the fix is not simply
  #      "bump plist" (see below).
  #
  # Exit criteria (BOTH must hold before dropping these two ids; verified
  # 2026-07-06, #383): the vulnerable quick-xml 0.39.x must be gone from
  # Cargo.lock entirely.
  #   - plist: DONE upstream. plist 1.10.0 requires quick-xml ^0.41 and Tauri
  #     accepts it (`plist ^1`). But `cargo update -p plist` alone does NOT
  #     clear the advisory: it ADDS quick-xml 0.41.0 while wayland-scanner keeps
  #     0.39.4 in the lock (two copies), so 0194/0195 still fire and we gain a
  #     duplicate dep for no audit benefit. Deferred until path 2 also moves, so
  #     a single quick-xml 0.41 resolves and both ids drop in one step.
  #   - wayland-scanner: PENDING. Latest (0.31.10) still pins quick-xml ^0.39.
  #     Clears when a wayland-scanner adopting >=0.41 resolves via a
  #     wl-clipboard-rs/arboard/tauri-plugin-clipboard-manager bump.
  # Re-check on every Tauri upgrade and whenever `cargo update` touches plist or
  # the arboard/wayland-* clipboard chain.
  "RUSTSEC-2026-0194", # quick-xml quadratic duplicate-attribute-name check
  "RUSTSEC-2026-0195", # quick-xml unbounded NsReader namespace allocation

  # --- gtk-rs GTK3 stack: unmaintained + one unsound, Linux-only via Tauri ---
  # Blocked until Tauri adopts gtk-rs 0.20. Tracked in #218.
  "RUSTSEC-2024-0429", # glib <0.20 VariantStrIter unsoundness (GHSA-wrw7-89jp-8q8g)
  "RUSTSEC-2024-0411", # gdkwayland-sys unmaintained
  "RUSTSEC-2024-0412", # gdk unmaintained
  "RUSTSEC-2024-0413", # atk unmaintained
  "RUSTSEC-2024-0414", # gdkx11-sys unmaintained
  "RUSTSEC-2024-0415", # gtk unmaintained
  "RUSTSEC-2024-0416", # atk-sys unmaintained
  "RUSTSEC-2024-0417", # gdkx11 unmaintained
  "RUSTSEC-2024-0418", # gdk-sys unmaintained
  "RUSTSEC-2024-0419", # gtk3-macros unmaintained
  "RUSTSEC-2024-0420", # gtk-sys unmaintained
  "RUSTSEC-2024-0370", # proc-macro-error unmaintained (via glib-macros)

  # --- unic-* unmaintained, via urlpattern -> tauri-utils -> tauri (desktop) ---
  "RUSTSEC-2025-0075", # unic-char-range unmaintained
  "RUSTSEC-2025-0080", # unic-common unmaintained
  "RUSTSEC-2025-0081", # unic-char-property unmaintained
  "RUSTSEC-2025-0098", # unic-ucd-ident unmaintained
  "RUSTSEC-2025-0100", # unic-ucd-version unmaintained
]
