name: Tests

# Behaviour gate (complements the fmt/clippy gate in rust-lint.yml). Runs the
# Rust workspace suite, the desktop vitest suite, and the Swift + Kotlin uniffi
# conformance KAT replays. CodeQL's default setup covers security analysis only;
# nothing here overlaps it.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-test:
    name: cargo test
    # Linux + macOS are the project's primary targets (Windows is explicitly
    # not vouched for); both run so platform-gated code is exercised.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # `--workspace` includes the Tauri desktop crate (`secretary-desktop`),
      # which needs GTK3/WebKitGTK system libs to compile on Linux. macOS
      # runners already have what they need. (Same step as rust-lint.yml.)
      - name: Install Tauri Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Mirrors the documented local command in CLAUDE.md. The
      # differential-replay tests (which shell out to `uv`) are behind an
      # opt-in Cargo feature and stay off here, so the suite is Rust-only.
      - name: cargo test --release --workspace
        run: cargo test --release --workspace

  desktop-test:
    name: desktop vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # pnpm version comes from desktop/package.json "packageManager".
      # `defaults.run.working-directory` only applies to `run:` steps, NOT
      # `uses:` actions — so the action runs from the repo root (which has no
      # package.json) unless we point it at the desktop one explicitly.
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          package_json_file: desktop/package.json
      # pnpm 11.3.0 (from desktop/package.json "packageManager") requires
      # Node >= 22.13; Node 20 is also now deprecated on the runners.
      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: pnpm test (vitest)
        run: pnpm test

  swift-conformance:
    name: swift conformance
    # The Swift conformance runner hard-requires a macOS host (swiftc + the
    # generated .modulemap); it exits non-zero on any other OS by design.
    # PINNED to macos-26 + a pinned Xcode (setup-xcode below): the `macos-latest`
    # label is mid-migration and nondeterministically resolves to macos-15
    # (Swift 6.0) or macos-26 (Swift 6.3) — pin the toolchain the code targets
    # so the compiler can't silently change (#424; same fix as ios-host).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: '26.5'   # Swift 6.3 — the macos-26 image default AND the code's target
      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Builds only the uniffi cdylib (no Tauri desktop crate → no GUI deps);
      # swiftc comes from the pinned Xcode above.
      - name: Swift uniffi conformance KAT replay
        run: bash ffi/secretary-ffi-uniffi/tests/swift/run_conformance.sh

  kotlin-conformance:
    name: kotlin conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # JDK 17+ is required for Kotlin 2.x output (the script checks for it).
      - name: Install JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17
      # kotlinc via the JetBrains-published snap (avoids unpinned third-party
      # actions). The script also fetches JNA + org.json jars, pinned and
      # SHA-256 verified inside the script. The snap is pinned to a specific
      # revision (#367) so the compiler is reproducible — an unpinned channel
      # would silently track latest. Bump deliberately: `snap info kotlin`.
      - name: Install Kotlin compiler
        run: sudo snap install --classic --revision=98 kotlin # kotlin 2.4.0 (stable)
      # Builds only the uniffi cdylib (no Tauri desktop crate → no GUI deps).
      - name: Kotlin uniffi conformance KAT replay
        run: bash ffi/secretary-ffi-uniffi/tests/kotlin/run_conformance.sh

  ios-host:
    name: ios host (swift test)
    # The two mobile host packages are FFI-free (no xcframework, no Rust), so
    # they build + test standalone on a plain macOS runner — no cargo build,
    # no rust-cache. Mirrors run-ios-tests.sh Step 1; guards the app-layer
    # view-model + formatter logic (e.g. the #421 neutral settings copy) that
    # the uniffi conformance jobs do NOT cover.
    #
    # PINNED to macos-26 (NOT macos-latest): the `macos-latest` label is mid-
    # migration and nondeterministically resolves to macos-15 (Swift 6.0) OR
    # macos-26 (Swift 6.3) — the same commit flip-flopped green/red across two
    # runs of this PR. The Swift packages are developed against Xcode 26.5 /
    # Swift 6.3 and rely on integer-literal type inference that Swift 6.0
    # rejects (array-literal arithmetic in generic XCTAssertEqual), so CI must
    # pin the toolchain the code targets. #424 (this file) now pins Xcode 26.5
    # via setup-xcode on both macOS Swift jobs + a uniform timeout on all jobs.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: '26.5'   # Swift 6.3 — the macos-26 image default AND the code's target
      - name: swift test — SecretaryDeviceUnlock (FFI-free host)
        run: swift test
        working-directory: ios/SecretaryDeviceUnlock
      - name: swift test — SecretaryVaultAccess (FFI-free host)
        run: swift test
        working-directory: ios/SecretaryVaultAccess

  android-host:
    name: android host (:vault-access:test)
    # `:vault-access` is pure kotlin(jvm), but the root settings.gradle.kts
    # includes the AGP modules (:app/:kit/:browse-ui/:sync-ui), which Gradle
    # configures even for a :vault-access-only test task — so an Android SDK
    # must be provisioned or configuration fails with "SDK location not found".
    # JDK 21 matches the module's jvmToolchain(21). Guards the app-layer host
    # logic (e.g. the #421 neutral settings copy) uncovered by kotlin-conformance.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Provision Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: ':vault-access:test'
        run: ./gradlew :vault-access:test
