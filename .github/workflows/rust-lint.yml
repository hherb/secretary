name: Rust lint

# Format + clippy + doc gate. Mirrors the documented local commands in
# CLAUDE.md so drift (e.g. #279) cannot reach `main` unnoticed. CodeQL's
# default setup covers security analysis only; it does not run fmt/clippy/doc.
#
# Scope: the cargo workspace. `core/fuzz/` is excluded from the workspace
# (and uses a separate nightly toolchain), so it is intentionally not linted
# here. The toolchain + rustfmt/clippy components come from rust-toolchain.toml.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: rust-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Formatting is platform-independent, so one runner suffices.
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    # Linux + macOS are the project's primary targets (Windows is explicitly
    # not vouched for); both run so platform-gated code is linted.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # The workspace includes the Tauri desktop crate (`secretary-desktop`),
      # which needs GTK3/WebKitGTK system libs to compile. ubuntu-latest does
      # not ship them; macOS runners already have what they need.
      - name: Install Tauri Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: Clippy (lib + tests, deny warnings)
        run: cargo clippy --release --workspace --tests -- -D warnings

  doc:
    name: cargo doc (deny warnings)
    # Gate intra-doc links so broken / private-item references (#92) cannot
    # silently re-accumulate. Mirrors clippy's matrix + Tauri Linux deps
    # because rustdoc only documents the `#[cfg]`-active code per platform,
    # so a macOS-only doc-link bug would slip past a Linux-only run.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # Turn every rustdoc warning (unresolved link, private-item link, …)
      # into a hard error. --no-deps keeps the scope to this workspace's own
      # crates; dependency docs are not our gate.
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      # The Tauri desktop crate (`secretary-desktop`) needs GTK3/WebKitGTK to
      # build before rustdoc can document it; ubuntu-latest lacks them.
      - name: Install Tauri Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: cargo doc --no-deps --workspace
        run: cargo doc --no-deps --workspace

  lean-binding:
    name: lean mobile-binding boundary
    # Regression tripwire for #189: the daemon deps (notify/clap) must not leak
    # into the FFI bridge or the mobile bindings beneath it. `cargo tree` only
    # resolves the dependency graph — it never compiles the crates — so this job
    # needs no GTK/WebKit/Tauri system libs and runs ubuntu-only and fast.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Prove the matcher actually fires (positive control) before trusting a
      # green guard — a vacuous check is the failure mode #231 surfaced.
      - name: Self-test the guard matcher
        run: bash ffi/scripts/check-lean-binding.sh --self-test
      - name: Assert binding crates stay lean (no notify/clap)
        run: bash ffi/scripts/check-lean-binding.sh
